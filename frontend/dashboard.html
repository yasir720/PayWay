<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PayWay - Dashboard</title>
        <link rel="stylesheet" href="css/dashboard_style.css" />
        <link rel="icon" type="image/png" href="./images/favicon.ico">
    </head>
    <body>
        <header class="dashboard-header">
            <h2>PayWay Dashboard</h2>

            <nav>
                <button onclick="showEmployees()">Employee Data</button>
                <button onclick="showSalaries()">Salary Data</button>
            </nav>
        </header>

        <section id="employee-section">
            <h3>Employees</h3>

            <button id="raise-btn" onclick="applyRaises()">
                Apply Department Raises
            </button>

            <table id="employee-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </section>

        <section id="salary-section" style="display: none">
            <h3>Salaries</h3>

            <table id="salary-table">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Salary</th>
                        <th>Effective Date</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </section>

        <script src="./js/dashboard.js"></script>
    </body>
</html>
