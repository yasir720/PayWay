<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PayWay - Dashboard</title>
        <link rel="stylesheet" href="css/dashboard_style.css" />
        <link rel="icon" type="image/png" href="./images/favicon.ico" />
    </head>
    <body>
        <div class="dashboard-container">
            <header class="dashboard-header">
                <h2>PayWay Dashboard</h2>
                <nav>
                    <button class="nav-btn" onclick="showEmployees()">
                        Employee Data
                    </button>
                    <button class="nav-btn" onclick="showSalaries()">
                        Salary Data
                    </button>
                    <button class="nav-btn" onclick="showAuditLogs()">
                        Audit Logs
                    </button>
                    <button class="nav-btn" onclick="showRegisterUser()">
                        Register User
                    </button>
                    <button class="nav-btn" onclick="logout()">Logout</button>
                </nav>
            </header>

            <section id="employee-section" class="section active">
                <h3>Employees</h3>
                <button
                    id="raise-btn"
                    class="action-btn"
                    onclick="applyRaises()"
                >
                    Apply Department Raises
                </button>

                <table id="employee-table" class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section id="salary-section" class="section" style="display: none">
                <h3>Current Salaries</h3>
                <table id="salary-table" class="data-table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Salary</th>
                            <th>Effective Date</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="salary-history-container"></div>
            </section>

            <section id="audit-section" class="section" style="display: none">
                <h3>Audit Log</h3>
                <table id="audit-table" class="data-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Action</th>
                            <th>Entity</th>
                            <th>ID</th>
                            <th>Description</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </div>

        <div id="edit-modal" class="modal" style="display: none">
            <div class="modal-content">
                <h3>Edit Employee</h3>

                <input type="hidden" id="edit-id" />

                <label>First Name</label>
                <input id="edit-first" />

                <label>Last Name</label>
                <input id="edit-last" />

                <label>Email</label>
                <input id="edit-email" />

                <label>Department ID</label>
                <input id="edit-department" />

                <div class="modal-actions">
                    <button type="button" onclick="submitEdit()">Save</button>
                    <button type="button" onclick="closeEditEmployeeModal()">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <div id="register-modal" class="modal" style="display: none">
            <div class="modal-content">
                <h3>Register User</h3>

                <label>Username</label>
                <input id="register-username" />

                <label>Password</label>
                <input type="password" id="register-password" />

                <label>Employee ID</label>
                <input id="register-employee-id" />

                <label>Role</label>
                <select id="register-role">
                    <option value="1">Employee</option>
                    <option value="2">HR</option>
                    <option value="3">Admin</option>
                </select>

                <div class="modal-actions">
                    <button type="button" onclick="submitRegister()">
                        Register
                    </button>
                    <button type="button" onclick="closeRegisterModal()">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <script src="./js/dashboard.js"></script>
    </body>
</html>
